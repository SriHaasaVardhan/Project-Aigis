name: health_guardian
description: AIGIS - AI-powered healthcare emergency detection and response assistant
publish_to: 'none'
version: 1.2.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI Components
  cupertino_icons: ^1.0.6
  flutter_screenutil: ^5.9.0
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  lottie: ^3.0.0
  shimmer: ^3.0.0

  # State Management
  provider: ^6.1.1
  flutter_riverpod: ^2.4.9

  # Camera & Image Processing
  camera: ^0.10.5+5
  image_picker: ^1.0.7
  google_ml_kit: ^0.16.0

  # Speech Recognition & TTS
  speech_to_text: ^7.3.0
  flutter_tts: ^3.8.5

  # Sensors & Wearable Integration
  sensors_plus: ^4.0.2
  health: ^10.1.0
  flutter_blue_plus: ^1.32.4

  # Location Services
  geolocator: ^10.1.0
  geocoding: ^2.1.1

  # Communication
  url_launcher: ^6.2.2
  telephony: ^0.2.0
  flutter_sms: ^3.0.1

  # Storage & Database
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  path: ^1.8.3

  # Network & API
  http: ^1.2.0
  dio: ^5.4.0
  connectivity_plus: ^5.0.2

  # Permissions
  permission_handler: ^11.2.0

  # Background Services
  flutter_background_service: ^5.0.5
  awesome_notifications: ^0.11.0

  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Charts & Visualization
  fl_chart: ^0.66.0
  syncfusion_flutter_charts: ^24.1.41

  # Date & Time
  intl: ^0.18.1
  timezone: ^0.9.2

  # Authentication
  local_auth: ^2.1.8

  # Encryption
  encrypt: ^5.0.3
  flutter_secure_storage: ^9.0.0

  # Utilities
  uuid: ^4.3.3
  logger: ^2.0.2+1
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  hive_generator: ^2.0.1

dependency_overrides:
  intl: ^0.20.2

flutter:
  uses-material-design: true
  
